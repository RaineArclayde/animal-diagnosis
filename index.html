<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>動物診断</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="app">

    <h1>動物診断テスト</h1>
    
<div id="start-screen">

    <h1>📖 モチーフアニマル図鑑</h1>

    <p>
        12個の質問から<br>
        あなたのモチーフアニマルを診断します。
    </p>

<button id="start-btn">
    <img src="images/start_button.png" alt="">
    <span>診断を開始する</span>
</button>
</div>
</div>
    
<div id="quiz-screen" class="hidden">

    <div id="progress-container">

    <div id="progress-text">
        1 / 12
    </div>

    <div id="progress-bar">
        <div id="progress"></div>
    </div>

</div>

<div id="question-container">
       <h2 id="question"></h2>

       <div id="choices"></div>

       <button id="back-btn" class="hidden">← 前の質問へ戻る
       </button>    
</div>

   
    <div id="result-container" class="hidden">

    <h3 id="result-label">
        診断結果
    </h3>

    <h1 id="result-title"></h1>
    <img id="animal-image" src="" alt="動物イラスト">
    <div id="result-keywords"></div>

       <h3>あなたの性格バランス</h3>
       
       <canvas id="radarChart" width="320" height="320"></canvas>
   
  <p id="result-text"></p>

<h3>相性の良いモチーフアニマル</h3>

<div id="compatibility"></div>

<button id="restart-btn">
    もう一度診断する
</button>

</div>

</div>

<script src="data/questions.js"></script>
<script src="data/animals.js"></script>
<script src="main.js"></script>

</body>
</html>
