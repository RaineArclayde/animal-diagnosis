<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>動物診断</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="app">

    <h1>動物診断テスト</h1>

<div id="progress-container">

    <div id="progress-text">
        1 / 12
    </div>

    <div id="progress-bar">
        <div id="progress"></div>
    </div>

</div>

<div id="question-container">
        <h2 id="question"></h2>

        <div id="choices"></div>
  
</div>
    
   <div id="result-container" class="hidden">

    <h3 id="result-label">
        診断結果
    </h3>

    <h1 id="result-title"></h1>

    <div id="result-keywords"></div>

       <h3>あなたの性格バランス</h3>
       
       <canvas id="radarChart" width="320" height="320"></canvas>
   
    <p id="result-text"></p>

    <button id="restart-btn">
        もう一度診断する
    </button>

</div>

</div>

<script src="data/questions.js"></script>
<script src="data/animals.js"></script>
<script src="main.js"></script>

</body>
</html>
